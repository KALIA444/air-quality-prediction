name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer le package + extras dev/monitoring
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev,app,monitoring]"

      - name: Analyse statique (ruff)
        run: ruff check src scripts app tests

      - name: Construire la cible + entrainer (le controle du modele necessite des artefacts)
        run: |
          python scripts/run.py build-target
          python scripts/run.py train

      - name: Lancer les tests (y compris le controle lent de qualite du modele)
        run: pytest -m "not slow" && pytest -m slow

      - name: Verification rapide du rapport de derive
        run: python scripts/run.py monitor

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Construire l'image de l'API
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
          python scripts/run.py build-target && python scripts/run.py train
          docker build -t air-quality-api:ci .
