name: CD

# Livraison continue : reproduire le modele, l'empaqueter en image Docker, puis
# le publier sur GHCR. Declenche sur les tags de version ou un lancement manuel.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer + reproduire le pipeline du modele (DVC)
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
          dvc repro || (python scripts/run.py build-target && python scripts/run.py train)

      - name: Se connecter a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construire et pousser l'image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}

      - name: Publier l'artefact du modele
        uses: actions/upload-artifact@v4
        with:
          name: model-${{ github.ref_name }}
          path: |
            models/best_model.joblib
            reports/metrics.json

      # Deploiement Render : declenche un redeploiement via le Deploy Hook du
      # service. Cree le service depuis render.yaml (Blueprint), copie son
      # "Deploy Hook" (Settings -> Deploy Hook) dans le secret Actions
      # RENDER_DEPLOY_HOOK_URL. L'etape est ignoree si le secret est absent.
      - name: Deployer sur Render
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Redeploiement Render declenche."
